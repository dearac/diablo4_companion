<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Diablo IV Gear Overlay</title>
    <!-- Content Security Policy that allows data: images (often used by Tailwind or inline SVGs) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"
    />
  </head>

  <body
    style="
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      user-select: none;
    "
  >
    <div id="root"></div>
    <script type="module" src="/src/overlay.tsx"></script>
  </body>
</html>
